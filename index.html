<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Projetos Web</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        background: #0f172a;
        color: #f8fafc;
      }

      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 3rem 1.5rem 4rem;
      }

      h1 {
        margin-bottom: 0.5rem;
        font-size: 2rem;
      }

      p {
        color: #cbd5e1;
        line-height: 1.6;
      }

      .grid {
        display: grid;
        gap: 1rem;
        margin-top: 2rem;
      }

      .card {
        background: #111827;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 1.25rem;
      }

      .card h2 {
        margin: 0 0 0.4rem;
        font-size: 1.1rem;
      }

      .card a {
        color: #38bdf8;
        text-decoration: none;
        font-weight: 600;
      }

      .card a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Mini Projetos Web</h1>
      <p>Uma coleção simples de projetos de front-end para praticar HTML, CSS e JavaScript.</p>

      <section class="grid">
        <article class="card">
          <h2>Gerador de senha aleatória</h2>
          <p>Projeto com geração de senhas, cópia para a área de transferência e interface simples.</p>
          <a href="./projetos/gerador-senha-aleatória/">Abrir projeto</a>
        </article>
      </section>
    </main>
  </body>
</html>
